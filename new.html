<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>
<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}
.box{
    background:rgba(255,255,255,0.1);
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:300px;
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:5px;
}
button{
    padding:10px 20px;
    border:none;
    border-radius:5px;
    background:#00c6fb;
    font-weight:bold;
    cursor:pointer;
}
#error{
    color:red;
}
</style>
</head>

<body>

<div class="box">
<h2>Admin Login</h2>

<input type="text" id="user" placeholder="Enter ID">
<input type="password" id="pass" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p id="error"></p>
</div>

<script>
function login(){
    var u=document.getElementById("user").value;
    var p=document.getElementById("pass").value;

    if(u==="admin" && p==="1234"){
        window.location.href="letter.html";
    }else{
        document.getElementById("error").innerHTML="Invalid ID or Password";
    }
}
</script>

</body>
</html>
